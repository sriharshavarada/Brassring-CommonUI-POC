name: Build and deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --configuration production --base-href "/Brassring-CommonUI-POC/" --verbose

      - name: Prepare Pages artifact path
        id: prepare_artifact
        run: |
          if [ -f dist/br-ui-framework/browser/index.html ]; then
            ARTIFACT_PATH="dist/br-ui-framework/browser"
          elif [ -f dist/br-ui-framework/index.html ]; then
            ARTIFACT_PATH="dist/br-ui-framework"
          else
            echo "Could not find index.html in expected dist paths."
            echo "Dist tree:"
            find dist -maxdepth 4 -type f || true
            exit 1
          fi

          cp "${ARTIFACT_PATH}/index.html" "${ARTIFACT_PATH}/404.html"
          touch "${ARTIFACT_PATH}/.nojekyll"
          echo "artifact_path=${ARTIFACT_PATH}" >> "$GITHUB_OUTPUT"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.prepare_artifact.outputs.artifact_path }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
