<br-custom-text-control *ngIf="mode === 'CUSTOM' && customConfig as cfg" [config]="cfg"
  [showLibraryTag]="showLibraryTag" (valueChange)="onImplementationValueChange($event)"
  (blurEvent)="onImplementationBlur($event)" (focusEvent)="onImplementationFocus($event)"
  (inputEvent)="onImplementationInput($event)" (changeEvent)="onImplementationChange($event)"
  (keydownEvent)="onImplementationKeydown($event)" (keyupEvent)="onImplementationKeyup($event)"
  (clickEvent)="onImplementationClick($event)">
</br-custom-text-control>

<br-material-text-control *ngIf="mode === 'MATERIAL' && materialConfig as cfg" [config]="cfg"
  [showLibraryTag]="showLibraryTag" (valueChange)="onImplementationValueChange($event)"
  (blurEvent)="onImplementationBlur($event)" (focusEvent)="onImplementationFocus($event)"
  (inputEvent)="onImplementationInput($event)" (changeEvent)="onImplementationChange($event)"
  (keydownEvent)="onImplementationKeydown($event)" (keyupEvent)="onImplementationKeyup($event)"
  (clickEvent)="onImplementationClick($event)">
</br-material-text-control>

<br-prime-text-control *ngIf="mode === 'PRIMENG' && primeConfig as cfg" [config]="cfg" [showLibraryTag]="showLibraryTag"
  (valueChange)="onImplementationValueChange($event)" (blurEvent)="onImplementationBlur($event)"
  (focusEvent)="onImplementationFocus($event)" (inputEvent)="onImplementationInput($event)"
  (changeEvent)="onImplementationChange($event)" (keydownEvent)="onImplementationKeydown($event)"
  (keyupEvent)="onImplementationKeyup($event)" (clickEvent)="onImplementationClick($event)">
</br-prime-text-control>
