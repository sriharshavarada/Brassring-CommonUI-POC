<mat-form-field appearance="outline" class="br-material-field">
  <mat-label class="br-material-label">
    {{ config.label }}
    <span *ngIf="showLibraryTag" class="br-lib-tag" aria-label="Library package control">LIB</span>
  </mat-label>
  <input matInput [ngClass]="config.className" [attr.id]="config.id" [attr.name]="config.name"
    [matAutocomplete]="auto" [placeholder]="config.placeholder" [disabled]="config.disabled"
    [required]="config.required" [ngModel]="config.value" (ngModelChange)="valueChange.emit($event)"
    (blur)="blurEvent.emit($event)" (focus)="focusEvent.emit($event)" (input)="inputEvent.emit($event)"
    (change)="changeEvent.emit($event)" (keydown)="keydownEvent.emit($event)" (keyup)="keyupEvent.emit($event)"
    (click)="clickEvent.emit($event)" />
  <mat-autocomplete #auto="matAutocomplete">
    <mat-option *ngFor="let opt of filtered()" [value]="opt.label">{{ opt.label }}</mat-option>
  </mat-autocomplete>
</mat-form-field>
