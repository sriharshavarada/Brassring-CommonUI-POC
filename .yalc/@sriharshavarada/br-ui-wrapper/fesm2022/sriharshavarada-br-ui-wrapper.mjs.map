<mat-form-field appearance="outline" class="br-material-field" [ngClass]="config.className" [attr.id]="config.id">
  <mat-label class="br-material-label">
    {{ config.label }}
    <span *ngIf="showLibraryTag" class="br-lib-tag" aria-label="Library package control">LIB</span>
  </mat-label>
  <mat-select multiple [attr.name]="config.name" [disabled]="config.disabled" [required]="config.required" [ngModel]="config.value"
    (ngModelChange)="valueChange.emit($event)" (blur)="blurEvent.emit($event)" (focus)="focusEvent.emit($event)"
    (input)="inputEvent.emit($event)" (change)="changeEvent.emit($event)" (keydown)="keydownEvent.emit($event)"
    (keyup)="keyupEvent.emit($event)" (click)="clickEvent.emit($event)" panelClass="br-multi-select-panel">
    <mat-select-trigger>
      {{ selectedLabels.length > 0 ? selectedLabels.join(', ') : 'Select options' }}
    </mat-select-trigger>
    <mat-option *ngFor="let opt of config.options" [value]="opt.value">
      <mat-checkbox [checked]="isSelected(opt.value)" [disableRipple]="true">
        {{ opt.label }}
      </mat-checkbox>
    </mat-option>
  </mat-select>
</mat-form-field>

<div class="br-selected-chips" *ngIf="selectedValues.length > 0">
  <ng-container *ngFor="let opt of config.options">
    <button type="button" class="br-chip" *ngIf="isSelected(opt.value)" (click)="removeValue(opt.value, $event)"
      [disabled]="config.disabled">
      <span>{{ opt.label }}</span>
      <span class="chip-close">x</span>
    </button>
  </ng-container>
</div>
