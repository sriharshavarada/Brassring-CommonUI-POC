<!-- Custom Date: Custom calendar implementation (non-native) -->
<div class="custom-date-wrapper" [ngClass]="wrapperClasses" [ngStyle]="wrapperStyles">
    <label class="date-label" *ngIf="config.label">
        {{ config.label }}
        <span *ngIf="showLibraryTag" class="br-lib-tag" aria-label="Library package control">LIB</span>
        <span class="required-marker" *ngIf="config.required">*</span>
    </label>

    <div class="input-container" [class.disabled]="config.disabled" (click)="openCalendar($event)">
        <span class="input-icon" *ngIf="config.uiConfig.showIcon">📅</span>

        <input
            type="text"
            class="date-input"
            [ngClass]="config.className"
            [attr.id]="config.id"
            [attr.name]="config.name"
            [value]="displayValue"
            [disabled]="config.disabled"
            [required]="config.required"
            [placeholder]="config.placeholder"
            readonly
            (click)="openCalendar($event); clickEvent.emit($event)"
            (blur)="blurEvent.emit($event)"
            (focus)="focusEvent.emit($event)"
            (input)="inputEvent.emit($event)"
            (change)="changeEvent.emit($event)"
            (keydown)="keydownEvent.emit($event)"
            (keyup)="keyupEvent.emit($event)"
        />

        <button
            type="button"
            class="toggle-btn"
            [disabled]="config.disabled"
            (click)="toggleCalendar($event)"
            aria-label="Toggle calendar"
        >
            ▾
        </button>

    </div>

    <div class="calendar-popover" *ngIf="isOpen" (click)="$event.stopPropagation()">
        <div class="calendar-header">
            <button type="button" class="nav-btn" (click)="goToPreviousMonth($event)" aria-label="Previous month">‹</button>
            <div class="month-year-switchers">
                <select class="month-select" [(ngModel)]="monthModel" (ngModelChange)="onMonthModelChange($event)" (click)="$event.stopPropagation()">
                    <option *ngFor="let month of monthOptions" [value]="month.value.toString()">{{ month.label }}</option>
                </select>
                <select class="year-select" [(ngModel)]="yearModel" (ngModelChange)="onYearModelChange($event)" (click)="$event.stopPropagation()">
                    <option *ngFor="let year of yearOptions" [value]="year.toString()">{{ year }}</option>
                </select>
            </div>
            <button type="button" class="nav-btn" (click)="goToNextMonth($event)" aria-label="Next month">›</button>
        </div>

        <div class="week-row week-head">
            <div class="week-cell" *ngFor="let header of dayHeaders">{{ header }}</div>
        </div>

        <div class="week-row" *ngFor="let week of calendarWeeks; trackBy: trackByWeek">
            <button
                type="button"
                class="day-cell"
                *ngFor="let cell of week; trackBy: trackByCell"
                [class.outside]="!cell.inMonth"
                [class.today]="cell.today"
                [class.selected]="cell.selected"
                [disabled]="cell.disabled"
                (click)="onCellClick(cell, $event)"
            >
                {{ cell.day }}
            </button>
        </div>
    </div>

    <span class="error-text" *ngIf="config.errorMessage">
        {{ config.errorMessage }}
    </span>
</div>
