<div class="br-control br-multi-select-control" [ngClass]="config.className" [attr.id]="config.id" [attr.name]="config.name">
  <label class="br-label">
    {{ config.label }}
    <span *ngIf="showLibraryTag" class="br-lib-tag" aria-label="Library package control">LIB</span>
  </label>
  <button type="button" class="br-multi-trigger" [disabled]="config.disabled" (click)="togglePanel($event)"
    (blur)="blurEvent.emit($event)" (focus)="focusEvent.emit($event)" (keydown)="keydownEvent.emit($event)"
    (keyup)="keyupEvent.emit($event)">
    <span class="trigger-text" *ngIf="selectedLabels.length === 0">Select options</span>
    <span class="trigger-text" *ngIf="selectedLabels.length > 0">{{ selectedLabels.join(', ') }}</span>
    <span class="trigger-caret" [class.open]="panelOpen">▾</span>
  </button>

  <div class="br-options-panel" *ngIf="panelOpen">
    <label class="br-option-row" *ngFor="let opt of config.options">
      <input type="checkbox" [checked]="isSelected(opt.value)" [disabled]="config.disabled"
        (change)="toggleValue(opt.value, $event)" (click)="clickEvent.emit($event)" />
      <span>{{ opt.label }}</span>
    </label>
  </div>

  <div class="br-selected-chips" *ngIf="selectedValues.length > 0">
    <ng-container *ngFor="let opt of config.options">
      <button type="button" class="br-chip" *ngIf="isSelected(opt.value)" (click)="removeValue(opt.value, $event)"
        [disabled]="config.disabled">
        <span>{{ opt.label }}</span>
        <span class="chip-close">x</span>
      </button>
    </ng-container>
  </div>
</div>
