<!--
  BR-DATE FAÇADE TEMPLATE
  ─────────────────────────
  Conditionally renders the correct implementation based on UI_MODE.
  Consumer code NEVER sees this switch — they only write <br-date>.
-->

<!-- CUSTOM implementation -->
<br-custom-date *ngIf="uiMode === 'CUSTOM'" [config]="customConfig" [showLibraryTag]="showLibraryTag"
  (dateChange)="onCustomDateChange($event)" (blurEvent)="onImplementationBlur($event)"
  (focusEvent)="onImplementationFocus($event)" (inputEvent)="onImplementationInput($event)"
  (changeEvent)="onImplementationChange($event)" (keydownEvent)="onImplementationKeydown($event)"
  (keyupEvent)="onImplementationKeyup($event)" (clickEvent)="onImplementationClick($event)">
</br-custom-date>

<!-- MATERIAL implementation -->
<br-material-date *ngIf="uiMode === 'MATERIAL'" [config]="materialConfig" [showLibraryTag]="showLibraryTag"
  (dateChange)="onMaterialDateChange($event)" (blurEvent)="onImplementationBlur($event)"
  (focusEvent)="onImplementationFocus($event)" (inputEvent)="onImplementationInput($event)"
  (changeEvent)="onImplementationChange($event)" (keydownEvent)="onImplementationKeydown($event)"
  (keyupEvent)="onImplementationKeyup($event)" (clickEvent)="onImplementationClick($event)">
</br-material-date>

<!-- PRIMENG implementation -->
<br-prime-date-control *ngIf="uiMode === 'PRIMENG'" [config]="primeConfig" [showLibraryTag]="showLibraryTag"
  (dateChange)="onPrimeDateChange($event)">
</br-prime-date-control>
